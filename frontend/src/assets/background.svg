<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#374151;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="spotGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Main background -->
  <rect width="1920" height="1080" fill="url(#bgGradient)"/>
  
  <!-- Decorative elements -->
  <circle cx="200" cy="200" r="100" fill="url(#spotGradient)"/>
  <circle cx="1700" cy="300" r="150" fill="url(#spotGradient)"/>
  <circle cx="300" cy="800" r="120" fill="url(#spotGradient)"/>
  <circle cx="1600" cy="900" r="80" fill="url(#spotGradient)"/>
  
  <!-- Abstract shapes for modern look -->
  <path d="M 0 400 Q 400 200 800 400 T 1600 400 L 1600 600 Q 1200 800 800 600 T 0 600 Z" fill="white" opacity="0.02"/>
  <path d="M 320 0 Q 720 300 1120 0 T 1920 0 L 1920 200 Q 1520 500 1120 200 T 320 200 Z" fill="white" opacity="0.03"/>
  
  <!-- Subtle geometric patterns -->
  <g opacity="0.05">
    <rect x="100" y="100" width="2" height="200" fill="white" transform="rotate(45 100 100)"/>
    <rect x="1800" y="200" width="2" height="150" fill="white" transform="rotate(-30 1800 200)"/>
    <rect x="200" y="900" width="2" height="180" fill="white" transform="rotate(60 200 900)"/>
    <rect x="1700" y="800" width="2" height="120" fill="white" transform="rotate(-45 1700 800)"/>
  </g>
</svg>